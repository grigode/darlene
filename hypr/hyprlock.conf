# BACKGROUND
background {
    monitor =
    path = ~/Wallpaper/wallpaper-1.png
    blur_passes = 2
    blur_size = 6
    noise = 0.0117
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.2
}

# RELOJ
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255,255,255,0.9)
    font_size = 90
    font_family = JetBrainsMono Nerd Font

    position = 0, 120
    halign = center
    valign = center
}

# FECHA
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color = rgba(255,255,255,0.7)
    font_size = 22
    font_family = JetBrainsMono Nerd Font

    position = 0, 40
    halign = center
    valign = center
}

# INPUT PASSWORD
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2

    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true

    outer_color = rgba(255,255,255,0.2)
    inner_color = rgba(0,0,0,0.4)
    font_color = rgba(255,255,255,1)

    placeholder_text = Password...
    fade_on_empty = false

    position = 0, -80
    halign = center
    valign = center
}
